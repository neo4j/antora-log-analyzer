name: Build dist

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-dist.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Build dist
        run: npx ncc build index.js -o dist

      - name: Check whether dist changed
        id: diff
        run: |
          if git diff --quiet -- dist/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::group::dist/ diff"
            git --no-pager diff -- dist/ | head -200
            echo "::endgroup::"
          fi

      - name: Commit rebuilt dist (same-repo PRs)
        if: steps.diff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/
          git commit -m "chore: rebuild dist"
          git push

      - name: Fail if dist stale (fork PRs)
        if: steps.diff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::dist/ is out of date. Run 'npx ncc build index.js -o dist' locally and commit the result."
          exit 1
